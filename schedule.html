<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>학사일정</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 달력을 예쁘게 정렬하기 위한 간단한 스타일 추가 */
        table {
            width: 100%;
            max-width: 700px;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #ccc;
            width: 14.28%;
            height: 80px;
            vertical-align: top;
            padding: 5px;
            box-sizing: border-box;
        }
        th {
            height: 40px;
            background-color: #f2f2f2;
            text-align: center;
            vertical-align: middle;
        }
        .sun { color: red; }    /* 일요일 빨간색 */
        .sat { color: blue; }   /* 토요일 파란색 */
        .schedule-text {
            font-size: 12px;
            color: #333;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <!-- 상단에 작게 로고를 추가하고 홈(index.html)으로 이동하도록 설정 -->
    <a href="index.html">
        <img src="logo.png" width="50" alt="SW 로고">
    </a>
    <h1>2026년 6월 학사일정</h1>
</header>

<section>

    <!-- 달력 구조의 테이블 -->
    <table>
        <thead>
            <tr>
                <th class="sun">일</th>
                <th>월</th>
                <th>화</th>
                <th>수</th>
                <th>목</th>
                <th>금</th>
                <th class="sat">토</th>
            </tr>
        </thead>
        <tbody>
            <!-- 1주차 (2026년 6월 1일은 월요일부터 시작) -->
            <tr>
                <td class="sun"></td>
                <td>1<div class="schedule-text">수업</div></td>
                <td>2<div class="schedule-text">수업</div></td>
                <td>3<div class="schedule-text">수업</div></td>
                <td>4<div class="schedule-text">수업</div></td>
                <td>5<div class="schedule-text">수업</div></td>
                <td class="sat">6</td>
            </tr>
            <!-- 2주차 -->
            <tr>
                <td class="sun">7</td>
                <td>8<div class="schedule-text">수업</div></td>
                <td>9<div class="schedule-text">수업</div></td>
                <td>10<div class="schedule-text">수업</div></td>
                <td>11<div class="schedule-text">개교기념일</div></td>
                <td>12<div class="schedule-text">수업</div></td>
                <td class="sat">13</td>
            </tr>
            <!-- 3주차 -->
            <tr>
                <td class="sun">14</td>
                <td>15<div class="schedule-text">수업</div></td>
                <td>16<div class="schedule-text">기말고사</div></td>
                <td>17<div class="schedule-text">기말고사</div></td>
                <td>18<div class="schedule-text">기말고사</div></td>
                <td>19<div class="schedule-text">기말고사</div></td>
                <td class="sat">20</td>
            </tr>
            <!-- 4주차 -->
            <tr>
                <td class="sun">21</td>
                <td>22<div class="schedule-text">기말고사</div></td>
                <td>23<div class="schedule-text">여름방학</div></td>
                <td>24<div class="schedule-text">여름방학</div></td>
                <td>25<div class="schedule-text">여름방학</div></td>
                <td>26<div class="schedule-text">여름방학</div></td>
                <td class="sat">21</td>
            </tr>
            <!-- 5주차 -->
            <tr>
                <td class="sun">28</td>
                <td>29<div class="schedule-text">여름방학</div></td>
                <td>30<div class="schedule-text">여름방학</div></td>
                <td></td>
                <td></td>
                <td></td>
                <td class="sat"></td>
            </tr>
        </tbody>
    </table>

    <br>

    <!-- 맨 아래 홈으로 텍스트 링크도 index.html로 수정 -->
    <a href="index.html">홈으로</a>

</section>

</body>
</html>
