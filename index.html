<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SunWoo's Campus</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <a href="index.html">
        <img src="logo.png" width="50" alt="SW 로고">
    </a>

    <h1>SunWoo's Campus</h1>

    <nav id="menu-nav">
        <a href="schedule.html">학사일정</a>
        <a href="myfun.html">나의 관심사</a>
        <a href="gallery.html">갤러리</a>
        <a href="time_table.html">시간표</a>
        <span id="auth-menu">
            <a href="login.html" target="_blank">로그인</a>
            <a href="join.html" target="_blank">회원가입</a>
        </span>
    </nav>
</header>

<section>
    <h2>환영합니다!</h2>
    <p>웹페이지 기초 과제를 위해 제작한 개인 홈페이지입니다.</p>
</section>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const authMenu = document.getElementById("auth-menu");

        if (isLoggedIn === "true") {
            // 로그인 상태면 기존 로그인/회원가입 버튼을 지우고 로그아웃 버튼을 넣음
            authMenu.innerHTML = `<a href="#" onclick="logout()">로그아웃</a>`;
        }
    });

    function logout() {
        localStorage.removeItem("isLoggedIn"); // 로그인 상태 삭제
        alert("로그아웃 되었습니다.");
        location.reload(); // 새로고침
    }
</script>

</body>
</html>
